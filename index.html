<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Discovery Test — Find Your Ideal Career Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-dark: #085041;
    --gray-bg: #F7F7F5;
    --gray-border: rgba(0,0,0,0.12);
    --gray-border-strong: rgba(0,0,0,0.22);
    --text-primary: #1a1a18;
    --text-secondary: #5a5a55;
    --text-tertiary: #9a9a94;
    --bg-primary: #ffffff;
    --bg-secondary: #f4f4f1;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    width: 100%;
    max-width: 640px;
    background: var(--bg-primary);
    border-radius: 16px;
    border: 0.5px solid var(--gray-border);
    padding: 2rem;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Progress Bar styling */
  .progress-bar { height: 4px; background: var(--gray-border); border-radius: 2px; margin-bottom: 2rem; }
  .progress-fill { height: 4px; background: var(--purple); border-radius: 2px; transition: width 0.3s ease; }

  /* UI Cards and Typography layouts */
  .brand { font-size: 13px; font-weight: 500; color: var(--purple); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .intro-title { font-size: 26px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.75rem; line-height: 1.3; }
  .intro-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.5rem; }
  .intro-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 2rem; }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
  .meta-item i { font-size: 16px; }
  
  .form-group { margin-bottom: 1.25rem; text-align: left; }
  .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; }
  
  .name-input, .select-input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 0.5px solid var(--gray-border-strong);
    background: var(--bg-primary); color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color 0.15s;
  }
  .name-input:focus, .select-input:focus { outline: none; border-color: var(--purple); }
  .divider { height: 0.5px; background: var(--gray-border); margin: 1.5rem 0; }

  /* Interactive Form Control Elements */
  .btn {
    padding: 12px 20px; border-radius: 10px; font-size: 15px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
    border: 0.5px solid var(--gray-border-strong); background: var(--bg-primary);
    color: var(--text-primary);
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-primary:hover { background: var(--purple-dark); }
  .btn-full { width: 100%; text-align: center; display: block; }

  /* Quiz Question Layout */
  .q-label { font-size: 12px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .q-text { font-size: 18px; font-weight: 500; color: var(--text-primary); line-height: 1.5; margin-bottom: 1.5rem; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }
  .opt-btn {
    padding: 13px 16px; border-radius: 10px;
    border: 0.5px solid var(--gray-border-strong);
    background: var(--bg-primary); color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.45;
  }
  .opt-btn:hover { background: var(--bg-secondary); }
  .opt-btn.selected { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
  .nav { display: flex; justify-content: space-between; align-items: center; }
  .q-count { font-size: 13px; color: var(--text-tertiary); }

  /* Submission Confirmation Screen Layout */
  .success-card { text-align: center; padding: 2.5rem 1rem; }
  .success-icon { width: 72px; height: 72px; background: var(--teal-light); color: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 1.5rem; }
  .success-title { font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 1rem; line-height: 1.4; }
  .success-msg { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem; }
  .coach-box { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; border: 0.5px solid var(--gray-border); text-align: left; }
  .coach-title { font-weight: 500; font-size: 15px; margin-bottom: 0.5rem; color: var(--purple-dark); }

  .footer { margin-top: 2rem; text-align: center; font-size: 12px; color: var(--text-tertiary); }

  @media (max-width: 480px) {
    body { padding: 0; }
    .container { border-radius: 0; border: none; padding: 1.5rem 1.25rem; min-height: 100vh; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="screen active" id="screen-intro">
    <div class="brand">Career Discovery Test</div>
    
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label for="lang-select" style="font-weight:500; color:var(--purple);"><i class="ti ti-language"></i> Select Language / भाषा निवडा / भाषा चुनें</label>
      <select id="lang-select" class="select-input" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="hi">Hindi (हिंदी)</option>
        <option value="mr">Marathi (मराठी)</option>
      </select>
    </div>

    <div class="intro-title" id="intro-title">Find your ideal career path</div>
    <div class="intro-sub" id="intro-sub">This test analyses your interests, personality, and work style to suggest careers genuinely suited to you — not just the popular ones. Based on the globally trusted RIASEC model.</div>
